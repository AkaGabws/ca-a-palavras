<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Para Sophia</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Trava de segurança para impedir a tela de "vazar" para os lados no celular */
    html, body {
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
    }

    #app {
      min-height: 500px;
      background: linear-gradient(135deg, #fff9f0 0%, #fef0e6 50%, #fde8d8 100%);
      font-family: 'Lato', sans-serif;
      padding: 1.2rem 0.5rem;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 700;
      color: #8B3A1A;
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .subtitle {
      text-align: center;
      font-size: clamp(0.65rem, 2.5vw, 0.85rem);
      color: #c0704a;
      margin-bottom: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1rem;
      padding: 0 0.5rem;
    }

    .word-chip {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: clamp(0.62rem, 2.5vw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1.5px solid;
      transition: all 0.3s ease;
    }

    .word-chip.pending { background: rgba(255,255,255,0.7); border-color: #f0a880; color: #b05030; }
    .word-chip.found { background: #8B3A1A; border-color: #8B3A1A; color: #fff; text-decoration: line-through; opacity: 0.6; }

    .grid-container {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
      padding: 4px;
    }

    .grid-scaler { display: inline-block; transform-origin: top center; }

    .grid {
      display: inline-grid;
      gap: 2px;
      user-select: none;
      background: rgba(255,255,255,0.5);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(200,120,80,0.2);
      box-shadow: 0 4px 20px rgba(139,58,26,0.08);
      touch-action: none;
    }

    .cell {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700;
      color: #7a3520; cursor: pointer;
      border-radius: 5px;
      background: rgba(255,255,255,0.6);
      transition: background 0.1s, color 0.1s;
      border: 1px solid rgba(200,130,90,0.15);
      text-transform: uppercase;
      -webkit-tap-highlight-color: transparent;
    }

    .cell.selected { background: rgba(255,180,130,0.7); color: #5a1a08; }
    .cell.found-word { background: #e8614a; color: #fff; border-color: #c44030; }

    .progress {
      text-align: center;
      font-size: clamp(0.75rem, 2.5vw, 0.85rem);
      color: #b06040;
      font-weight: 300;
    }

    /* OVERLAY */
    .envelope-overlay {
      position: fixed;
      inset: 0;
      background: rgba(40,10,5,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .envelope-overlay.show { opacity: 1; pointer-events: all; }

    /* Cena: envelope embaixo, carta flutua acima independente */
    .envelope-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      width: min(300px, 88vw);
    }

    /* CARTA — posicionada acima da cena, independente do envelope */
    .letter {
      position: absolute;
      width: 100%;
      bottom: calc(min(180px, 52vw) + 10px); /* logo acima do envelope */
      left: 0;
      background: #fffaf6;
      border: 1px solid #f0c4a0;
      border-radius: 6px;
      padding: clamp(0.9rem, 3vw, 1.3rem) clamp(0.7rem, 2.5vw, 1.1rem);
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(calc(min(180px, 52vw) + 30px)); /* começa escondida dentro do envelope */
      transition: transform 1.4s cubic-bezier(0.2,0,0.1,1), opacity 0.5s ease;
      z-index: 210;
    }

    .letter.risen {
      opacity: 1;
      transform: translateY(0px);
    }

    .letter-top {
      font-size: clamp(0.6rem, 2vw, 0.72rem);
      color: #c06040;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      font-family: 'Lato', sans-serif;
    }

    .letter-body {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      color: #6a2a10;
      line-height: 1.7;
      font-style: italic;
    }

    .letter-sign {
      margin-top: 0.7rem;
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      color: #c08060;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.06em;
    }

    /* ENVELOPE */
    .env-stage {
      position: relative;
      width: min(280px, 80vw);
      height: min(180px, 52vw);
      flex-shrink: 0;
      transition: opacity 0.7s ease;
    }

    .env-stage.hide { opacity: 0; }

    .env-body {
      position: absolute;
      inset: 0;
      background: #fff5ed;
      border: 2px solid #d4845a;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      z-index: 1;
    }

    .env-tri-left {
      position: absolute; bottom: 0; left: 0;
      width: 0; height: 0;
      border-bottom: solid #e07050;
      border-right: solid transparent;
      border-bottom-width: min(90px, 26vw);
      border-right-width: min(140px, 40vw);
      z-index: 2;
    }

    .env-tri-right {
      position: absolute; bottom: 0; right: 0;
      width: 0; height: 0;
      border-bottom: solid #d86040;
      border-left: solid transparent;
      border-bottom-width: min(90px, 26vw);
      border-left-width: min(140px, 40vw);
      z-index: 2;
    }

    .env-flap {
      position: absolute;
      top: 0; left: 0; width: 100%;
      transform-origin: top center;
      transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
      z-index: 5;
      pointer-events: none;
    }
    .env-flap svg { display: block; width: 100%; }
    .env-flap.open { transform: rotateX(180deg); }

    .env-heart {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(1.2rem, 5vw, 1.6rem);
      z-index: 6;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    .env-heart.hide { opacity: 0; }

    .close-btn {
      margin-top: calc(min(180px, 52vw) + 1.5rem);
      padding: 10px 28px;
      background: transparent;
      border: 1.5px solid rgba(255,200,160,0.5);
      color: #ffd4b0;
      border-radius: 24px;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      opacity: 0;
      animation: fadeInBtn 0.5s ease 4.5s forwards;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
      z-index: 220;
    }
    .close-btn:hover { background: rgba(255,200,160,0.15); border-color: rgba(255,200,160,1); color: #fff; }
    @keyframes fadeInBtn { to { opacity: 1; } }

    .confetti-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 199; overflow: hidden;
    }
    .confetti-piece {
      position: absolute; border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .hearts-float {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 198; overflow: hidden;
    }
    .heart-float {
      position: absolute;
      animation: heartRise linear forwards;
    }
    @keyframes heartRise {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0.9; }
      100% { transform: translateY(-20vh) scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="app">
    <h1>Caça-Palavras</h1>
    <div class="subtitle">Encontre todas as palavras escondidas</div>
    <div class="word-list" id="wordList"></div>
    <div class="grid-container">
      <div class="grid-scaler" id="gridScaler">
        <div class="grid" id="grid"></div>
      </div>
    </div>
    <div class="progress" id="progress">0 de 5 palavras encontradas</div>
  </div>

  <div class="hearts-float" id="heartsFloat"></div>
  <div class="confetti-container" id="confetti"></div>

  <div class="envelope-overlay" id="overlay">
    <div class="envelope-scene" id="scene">

      <div class="letter" id="letter">
        <div class="letter-top">✦ um convite especial ✦</div>
        <div class="letter-body">Gostaria de sair<br>com você no dia 1<br>para o Vila Lobos<br>para fazermos um<br>piquenique 🧺</div>
        <div class="letter-sign">— com carinho Gabs </div>
      </div>

      <div class="env-stage" id="envStage">
        <div class="env-body"></div>
        <div class="env-tri-left"></div>
        <div class="env-tri-right"></div>
        <div class="env-flap" id="flap">
          <svg viewBox="0 0 280 90" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <polygon points="0,0 280,0 140,90" fill="#e8895a"/>
            <line x1="0" y1="0" x2="280" y2="0" stroke="#d4845a" stroke-width="2"/>
            <line x1="0" y1="0" x2="140" y2="90" stroke="#d4845a" stroke-width="1.5"/>
            <line x1="280" y1="0" x2="140" y2="90" stroke="#d4845a" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="env-heart" id="envHeart">💌</div>
      </div>

      <button class="close-btn" id="closeBtn">fechar ✕</button>
    </div>
  </div>

  <script>
  document.getElementById('closeBtn').onclick = () => {
    document.getElementById('overlay').classList.remove('show');
  };

  const WORDS = [
    { word: 'SAIR',       dir: 'H', row: 1,  col: 2 },
    { word: 'COMIGO',     dir: 'V', row: 0,  col: 7 },
    { word: 'DIA',        dir: 'H', row: 5,  col: 0 },
    { word: 'VILALOBOS',  dir: 'V', row: 0,  col: 11 },
    { word: 'PIQUENIQUE', dir: 'H', row: 8,  col: 1 },
  ];

  const ROWS = 12, COLS = 14;
  const grid = Array.from({length: ROWS}, () => Array(COLS).fill(''));

  WORDS.forEach(({word, dir, row, col}) => {
    for (let i = 0; i < word.length; i++) {
      const r = dir === 'V' ? row + i : row;
      const c = dir === 'H' ? col + i : col;
      grid[r][c] = word[i];
    }
  });

  const ABC = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!grid[r][c]) grid[r][c] = ABC[Math.floor(Math.random() * 26)];

  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${COLS}, 30px)`;
  gridEl.style.gridTemplateRows    = `repeat(${ROWS}, 30px)`;

  const cellEls = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.textContent = grid[r][c];
      el.dataset.r = r; el.dataset.c = c;
      gridEl.appendChild(el);
      cellEls.push(el);
    }
  }

  function scaleGrid() {
    const scaler = document.getElementById('gridScaler');
    const available = Math.min(document.documentElement.clientWidth - 16, 500);
    const gridW = COLS * 30 + (COLS - 1) * 2 + 20;
    const scale = Math.min(1, available / gridW);
    scaler.style.transform = `scale(${scale})`;
    scaler.style.marginBottom = scale < 1 ? `${-(gridW * (1 - scale) * (ROWS / COLS) * 0.5)}px` : '0';
  }
  scaleGrid();
  window.addEventListener('resize', scaleGrid);

  const foundWords = new Set();
  const foundCells = new Set();
  let selecting = false, startCell = null, selectedCells = [];

  function getCell(r, c) { return cellEls[r * COLS + c]; }

  function getCellsInLine(r1, c1, r2, c2) {
    const dr = r2 === r1 ? 0 : r2 > r1 ? 1 : -1;
    const dc = c2 === c1 ? 0 : c2 > c1 ? 1 : -1;
    if (dr !== 0 && dc !== 0) return [];
    const res = [];
    const steps = Math.max(Math.abs(r2 - r1), Math.abs(c2 - c1));
    let r = r1, c = c1;
    for (let i = 0; i <= steps; i++) { res.push({r, c}); r += dr; c += dc; }
    return res;
  }

  function clearSelection() {
    cellEls.forEach((el, i) => {
      const r = Math.floor(i / COLS), c = i % COLS;
      if (!foundCells.has(`${r},${c}`)) el.className = 'cell';
    });
  }

  function applySelection(cells, cls) {
    cells.forEach(({r, c}) => {
      if (!foundCells.has(`${r},${c}`)) getCell(r, c).className = 'cell ' + cls;
    });
  }

  function checkWord(cells) {
    const word    = cells.map(({r, c}) => grid[r][c]).join('');
    const wordRev = word.split('').reverse().join('');
    const match = WORDS.find(w => !foundWords.has(w.word) && (w.word === word || w.word === wordRev));
    if (match) {
      foundWords.add(match.word);
      cells.forEach(({r, c}) => {
        foundCells.add(`${r},${c}`);
        getCell(r, c).className = 'cell found-word';
      });
      updateUI();
      if (foundWords.size === WORDS.length) setTimeout(triggerEnvelope, 600);
    }
  }

  function updateUI() {
    document.getElementById('wordList').innerHTML = WORDS.map(w =>
      `<div class="word-chip ${foundWords.has(w.word) ? 'found' : 'pending'}">${w.word}</div>`
    ).join('');
    document.getElementById('progress').textContent =
      `${foundWords.size} de ${WORDS.length} palavras encontradas`;
  }

  /* mouse */
  gridEl.addEventListener('mousedown', e => {
    const cell = e.target.closest('.cell'); if (!cell) return;
    selecting = true;
    startCell = {r: +cell.dataset.r, c: +cell.dataset.c};
    selectedCells = [startCell];
    applySelection(selectedCells, 'selected');
    e.preventDefault();
  });

  gridEl.addEventListener('mousemove', e => {
    if (!selecting) return;
    const cell = e.target.closest('.cell'); if (!cell) return;
    const end = {r: +cell.dataset.r, c: +cell.dataset.c};
    const line = getCellsInLine(startCell.r, startCell.c, end.r, end.c);
    if (!line.length) return;
    clearSelection(); selectedCells = line; applySelection(line, 'selected');
  });

  document.addEventListener('mouseup', () => {
    if (!selecting) return;
    selecting = false;
    checkWord(selectedCells);
    clearSelection(); selectedCells = [];
  });

  /* touch */
  function cellFromTouch(touch) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    return el && el.closest('.cell');
  }

  gridEl.addEventListener('touchstart', e => {
    const cell = cellFromTouch(e.touches[0]); if (!cell) return;
    selecting = true;
    startCell = {r: +cell.dataset.r, c: +cell.dataset.c};
    selectedCells = [startCell];
    applySelection(selectedCells, 'selected');
    e.preventDefault();
  }, {passive: false});

  gridEl.addEventListener('touchmove', e => {
    if (!selecting) return;
    const cell = cellFromTouch(e.touches[0]); if (!cell) return;
    const end = {r: +cell.dataset.r, c: +cell.dataset.c};
    const line = getCellsInLine(startCell.r, startCell.c, end.r, end.c);
    if (!line.length) return;
    clearSelection(); selectedCells = line; applySelection(line, 'selected');
    e.preventDefault();
  }, {passive: false});

  gridEl.addEventListener('touchend', () => {
    if (!selecting) return;
    selecting = false;
    checkWord(selectedCells);
    clearSelection(); selectedCells = [];
  });

  /* animação envelope */
  function triggerEnvelope() {
    spawnConfetti();
    spawnHearts();
    document.getElementById('overlay').classList.add('show');

    // 1s: abre o flap
    setTimeout(() => {
      document.getElementById('flap').classList.add('open');
      document.getElementById('envHeart').classList.add('hide');

      // após flap abrir: carta sobe
      setTimeout(() => {
        document.getElementById('letter').classList.add('risen');

        // envelope some depois que carta subiu — só o envelope, carta fica
        setTimeout(() => {
          document.getElementById('envStage').classList.add('hide');
        }, 1000);

      }, 800);
    }, 1000);
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti');
    const colors = ['#e8614a','#f0a860','#ffd080','#c84040','#ff8060','#ffb060'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `left:${Math.random()*100}vw;width:${6+Math.random()*7}px;height:${6+Math.random()*7}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()}s`;
      container.appendChild(p);
      setTimeout(() => p.remove(), 4500);
    }
  }

  function spawnHearts() {
    const container = document.getElementById('heartsFloat');
    const emojis = ['❤️','🌸','💖','🌺','✨'];
    for (let i = 0; i < 14; i++) {
      const h = document.createElement('div');
      h.className = 'heart-float';
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.cssText = `left:${5+Math.random()*90}vw;font-size:${0.8+Math.random()*0.8}rem;animation-duration:${3+Math.random()*2}s;animation-delay:${Math.random()*1.5}s`;
      container.appendChild(h);
      setTimeout(() => h.remove(), 5500);
    }
  }

  updateUI();
  </script>
</body>
</html>
